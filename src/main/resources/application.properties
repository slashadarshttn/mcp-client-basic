spring.application.name=mcp-client-basic
server.port=8082

# N8N Webhook Configuration (direct HTTP calls - no MCP client needed)
n8n.base-url=http://localhost:5678
n8n.webhook.list-files-path=/webhook/list-files
n8n.webhook.process-video-path=/webhook/process-file

# OpenAI (used by spring-ai-starter-model-openai for LLM decision making)
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-5.4

# Logging
logging.level.org.springframework.ai=INFO
logging.level.client.basic.mcp=DEBUG
